<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padma Nexus s.r.o.</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1f3a;
    color: white;
}

.container {
    width: 90%;
    max-width: 1200px;
    margin: auto;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    height: 50px;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 80px 0;
}

.hero-text h1 {
    font-size: 48px;
}

.highlight {
    color: #f4b400;
}

.hero img {
    width: 300px;
}

/* SERVICES */
.services {
    background: white;
    color: #0b1f3a;
    padding: 60px 0;
}

.services h2 {
    text-align: center;
}

.cards {
    display: flex;
    gap: 20px;
    margin-top: 40px;
}

.card {
    background: #f5f5f5;
    padding: 20px;
    border-radius: 10px;
    flex: 1;
}

/* CTA */
.cta {
    background: linear-gradient(90deg, #0b1f3a, #0f8f4f);
    padding: 50px;
    text-align: center;
}

.button {
    background: #f4b400;
    color: black;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 5px;
}

/* FOOTER */
footer {
    padding: 30px 0;
    text-align: center;
    background: #081528;
}
</style>

</head>

<body>

<div class="container">

<header>
    <div class="logo">
        <img src="logo.png" alt="logo">
        <strong>Padma Nexus</strong>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h1>We turn data into <span class="highlight">value</span></h1>
        <p>IT, Data Processing & Business Consulting</p>
        <a class="button" href="#">Contact Us</a>
    </div>

    <img src="logo.png" alt="logo">
</section>

</div>

<section class="services">
    <div class="container">
        <h2>Our Services</h2>

        <div class="cards">
            <div class="card">Business Process Analysis</div>
            <div class="card">CRM Implementation</div>
            <div class="card">Data Processing</div>
            <div class="card">UI/UX Design</div>
        </div>
    </div>
</section>

<section class="cta">
    <h2>Ready to optimize your business?</h2>
    <a class="button" href="#">Get in touch</a>
</section>

<footer>
    © 2026 Padma Nexus s.r.o.
</footer>

</body>
</html>
